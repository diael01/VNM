<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VNM TestCoverage Dashboard</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #13213a;
      --muted: #4f5d75;
      --accent: #0a7f8c;
      --accent-2: #ef6f6c;
      --ok: #2a9d8f;
      --bad: #9aa8bd;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #d9eef2 0%, var(--bg) 45%), var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(900px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 15px 50px rgba(10, 38, 59, 0.14);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }
    p {
      margin-top: 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }
    .card {
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .title {
      font-weight: 600;
      font-size: 18px;
    }
    .status {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e9f6f4;
      color: var(--ok);
      white-space: nowrap;
    }
    .status.off {
      background: #eef2f7;
      color: var(--bad);
    }
    a.button {
      text-decoration: none;
      background: linear-gradient(120deg, var(--accent), #0e8ea0);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      display: inline-block;
    }
    .footer {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>VNM TestCoverage Dashboard</h1>
    <p>Generated by <strong>Setup/coverage-dashboard.ps1</strong>.</p>

    <section class="grid">
      <article class="card">
        <div>
          <div class="title">Backend Coverage</div>
          <div>ReportGenerator HTML output from .NET test projects.</div>
        </div>
        <div>
          <div class="status ">Ready</div>
          <div style="margin-top:8px;"><a class="button" href="backend/report/index.html">Open</a></div>
        </div>
      </article>

      <article class="card">
        <div>
          <div class="title">UI Coverage</div>
          <div>Vitest coverage report for the UI workspace.</div>
        </div>
        <div>
          <div class="status ">Ready</div>
          <div style="margin-top:8px;"><a class="button" href="ui/index.html">Open</a></div>
        </div>
      </article>
    </section>

    <div class="footer">Location: D:\projects\VNM\Code\TestCoverage\index.html</div>
  </main>
</body>
</html>
